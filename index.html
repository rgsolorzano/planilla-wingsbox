<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Planilla Quincenal</title>
<!-- SheetJS para leer archivos .xlsx -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- Google Identity Services (OAuth2 PKCE) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Google API client -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  /* Paleta WingsBox: índigo/morado profundo + acento coral, texto blanco */
  :root{
    --bg:#1b1340; --panel:#2a1d5e; --panel-2:#3a2a78; --line:#3a2c6e;
    --text:#f3f1fb; --muted:#b3a9d9; --primary:#e8455f; --primary-d:#cf3650;
    --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --violet:#8b5cf6; --cyan:#06b6d4;
    --content-bg:#f6f4fb; --card:#ffffff; --c-text:#1f1638; --c-muted:#6b6385; --c-line:#e6e1f1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--content-bg);color:var(--c-text);font-size:14px}
  .layout{display:flex;min-height:100vh}

  /* ---------- Menu lateral ---------- */
  .sidebar{width:250px;background:var(--bg);color:var(--text);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;transition:width .2s ease}
  .sidebar .brand{padding:20px 18px;font-size:18px;font-weight:700;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .sidebar .brand .logo{font-size:22px;line-height:1}
  .sidebar .brand .brand-text{display:flex;flex-direction:column}
  .sidebar .brand small{display:block;font-size:11px;font-weight:400;color:var(--muted)}
  .collapse-btn{margin-left:auto;background:var(--panel);color:#fff;border:0;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:14px;line-height:1}
  .collapse-btn:hover{background:var(--panel-2)}
  /* ---- Estado colapsado (solo iconos) ---- */
  .sidebar.collapsed{width:66px}
  .sidebar.collapsed .brand{justify-content:center;padding:18px 0}
  .sidebar.collapsed .brand-text{display:none}
  .sidebar.collapsed .collapse-btn{margin-left:6px;padding:4px 8px}
  .sidebar.collapsed .nav button{justify-content:center;font-size:0;padding:14px 0;border-left-width:3px}
  .sidebar.collapsed .nav button .ico{font-size:19px}
  .sidebar.collapsed .foot{display:none}
  .nav{padding:10px 0;flex:1}
  .nav button{width:100%;text-align:left;background:none;border:0;color:var(--text);padding:12px 18px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;transition:.15s}
  .nav button:hover{background:var(--panel)}
  .nav button.active{background:var(--panel);border-left-color:var(--primary);font-weight:600}
  .nav .ico{width:20px;text-align:center}
  .sidebar .foot{padding:14px 18px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}

  /* ---------- Contenido ---------- */
  .main{flex:1;padding:24px 28px;max-width:100%;overflow-x:hidden}
  .page{display:none;animation:fade .2s}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  .page-head h1{font-size:22px;font-weight:700}
  .page-head p{color:var(--c-muted);font-size:13px;margin-top:2px}

  .card{background:var(--card);border:1px solid var(--c-line);border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .card h2{font-size:15px;margin-bottom:14px;font-weight:700}
  .card h3{font-size:13px;margin:14px 0 8px;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.04em}

  /* ---------- Formularios ---------- */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:600;color:var(--c-muted)}
  .field input,.field select,.field textarea{padding:9px 10px;border:1px solid var(--c-line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--c-text)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,69,95,.18)}
  .field input.invalid,.field select.invalid{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.12)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

  /* ---------- Botones ---------- */
  .btn{padding:9px 15px;border:0;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-ghost{background:var(--content-bg);color:var(--c-text);border:1px solid var(--c-line)}
  .btn-ghost:hover{background:#efeafa}
  .btn-green{background:var(--green);color:#fff}
  .btn-red{background:var(--red);color:#fff}
  .btn-amber{background:var(--amber);color:#fff}
  .btn-sm{padding:5px 9px;font-size:12px}
  .btn-icon{padding:5px 8px;font-size:12px;background:var(--content-bg);border:1px solid var(--c-line);color:var(--c-text);border-radius:6px;cursor:pointer}
  .btn-icon:hover{background:#efeafa}
  .btn-icon.del:hover{background:#fee2e2;border-color:#fca5a5;color:var(--red)}

  /* ---------- Tablas ---------- */
  .table-wrap{overflow-x:auto;border:1px solid var(--c-line);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
  th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--c-line);white-space:nowrap}
  th{background:#f1ecfa;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--c-muted);position:sticky;top:0}
  tbody tr:hover{background:#faf8fe}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tfoot td{font-weight:700;background:#f1ecfa}
  table input,table select{width:100%;min-width:80px;padding:5px 6px;border:1px solid var(--c-line);border-radius:6px;font-size:12px;background:#fff}
  .empty{padding:30px;text-align:center;color:var(--c-muted);font-size:13px}

  /* ---------- Badges / alertas de color ---------- */
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .b-late{background:#fef3c7;color:#92400e}
  .b-miss{background:#fee2e2;color:#991b1b}
  .b-vac{background:#ede9fe;color:#5b21b6}
  .b-free{background:#cffafe;color:#155e75}
  .b-disc{background:#fee2e2;color:#991b1b}
  .b-extra{background:#dcfce7;color:#166534}
  .b-ok{background:#dcfce7;color:#166534}
  .row-vac{background:#faf5ff !important}
  .row-miss{background:#fef2f2 !important}
  .row-free{background:#ecfeff !important}

  .pill{display:inline-flex;gap:6px;align-items:center;background:var(--content-bg);border:1px solid var(--c-line);padding:6px 10px;border-radius:8px;font-size:12px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--c-line);border-radius:10px;padding:14px}
  .kpi .label{font-size:11px;color:var(--c-muted);text-transform:uppercase;font-weight:600}
  .kpi .value{font-size:20px;font-weight:800;margin-top:4px}
  .kpi.green .value{color:var(--green)} .kpi.red .value{color:var(--red)} .kpi.blue .value{color:var(--primary)} .kpi.violet .value{color:var(--violet)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
  .emp-block{margin-bottom:26px}
  .emp-block .emp-title{font-size:16px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:12px}
  .summary .item{background:var(--content-bg);border:1px solid var(--c-line);border-radius:8px;padding:10px 12px}
  .summary .item .l{font-size:11px;color:var(--c-muted);font-weight:600}
  .summary .item .v{font-size:16px;font-weight:800;margin-top:2px}
  .summary .item.total{background:#fdeef1;border-color:#f6c4ce}
  .summary .item.total .v{color:var(--primary-d)}

  /* ---------- Toasts ---------- */
  #toasts{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:10px;z-index:9999}
  .toast{padding:12px 16px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);min-width:240px;animation:slide .25s}
  .toast.success{background:var(--green)} .toast.error{background:var(--red)} .toast.warn{background:var(--amber)} .toast.info{background:var(--primary)}
  @keyframes slide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

  .hint{font-size:12px;color:var(--c-muted);margin-top:8px}
  .danger-zone{border:1px dashed #fca5a5;background:#fef2f2}

  /* ---------- Google Drive sync bar ---------- */
  .gd-bar{padding:10px 14px;background:var(--panel-2);border-radius:10px;display:flex;flex-direction:column;gap:6px;font-size:12px}
  .gd-bar .gd-title{font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;font-size:13px}
  .gd-bar .gd-status{color:var(--muted);font-size:11px;line-height:1.4}
  .gd-bar .gd-status.ok{color:#86efac}
  .gd-bar .gd-status.err{color:#fca5a5}
  .gd-bar .gd-btns{display:flex;gap:6px;flex-wrap:wrap}
  .btn-drive{background:#4285f4;color:#fff;border:0;border-radius:7px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s}
  .btn-drive:hover{background:#2b6fd4}
  .btn-drive:disabled{background:#4a4270;color:var(--muted);cursor:not-allowed}
  .btn-drive.red{background:#ef4444}
  .btn-drive.red:hover{background:#dc2626}
  .btn-drive.green{background:#22c55e}
  .btn-drive.green:hover{background:#16a34a}
  .sidebar.collapsed .gd-bar{display:none}
  .sidebar-toggle{display:none}

  /* ---------- Responsive ---------- */
  @media(max-width:880px){
    .layout{flex-direction:column}
    .sidebar{width:100%;height:auto;position:relative;flex-direction:column}
    .nav{display:none;flex-direction:column}
    .nav.open{display:flex}
    .nav button{border-left:0;border-bottom:1px solid var(--line)}
    .sidebar .foot{flex-direction:row}
    .sidebar-toggle{display:inline-flex;position:absolute;right:14px;top:16px;background:var(--panel);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
    .collapse-btn{display:none}
    .sidebar.collapsed{width:100%}
    .sidebar.collapsed .brand-text{display:flex}
    .sidebar.collapsed .nav button{justify-content:flex-start;font-size:14px;padding:12px 18px}
    .main{padding:16px}
  }
</style>
</head>
<body>
<div id="toasts"></div>
<div class="layout">
  <!-- ===================== MENU LATERAL ===================== -->
  <aside class="sidebar">
    <div class="brand">
      <span class="logo">💼</span>
      <span class="brand-text">Planilla<small>Cálculo quincenal de personal</small></span>
      <button class="collapse-btn" id="collapseBtn" title="Colapsar menú">«</button>
      <button class="sidebar-toggle" id="navToggle">☰</button>
    </div>
    <nav class="nav" id="nav">
      <button data-page="empleados" class="active"><span class="ico">👥</span> Empleados</button>
      <button data-page="horarios"><span class="ico">🕒</span> Horarios</button>
      <button data-page="marcaciones"><span class="ico">📥</span> Carga de horas</button>
      <button data-page="descuentos"><span class="ico">➖</span> Descuentos</button>
      <button data-page="pagos"><span class="ico">➕</span> Pagos extra</button>
      <button data-page="libres"><span class="ico">🌴</span> Días libres / Vacaciones</button>
      <button data-page="calculo"><span class="ico">🧮</span> Cálculo quincenal</button>
      <button data-page="consolidado"><span class="ico">📊</span> Consolidado</button>
      <button data-page="boleta"><span class="ico">🧾</span> Boleta por empleado</button>
      <button data-page="admin"><span class="ico">⚙️</span> Administración</button>
    </nav>
    <div class="foot">
      <div class="gd-bar" id="gdBar">
        <div class="gd-title">☁️ Google Drive</div>
        <div class="gd-status" id="gdStatus">No conectado</div>
        <div class="gd-btns">
          <button class="btn-drive" id="gdConnect">🔑 Conectar</button>
          <button class="btn-drive green" id="gdSave" disabled>⬆ Guardar</button>
          <button class="btn-drive" id="gdLoad" disabled>⬇ Cargar</button>
          <button class="btn-drive red" id="gdDisconnect" style="display:none">Desconectar</button>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="btnSeed">Recargar datos de ejemplo</button>
      <button class="btn btn-red btn-sm" id="btnWipe">Borrar todos los datos</button>
    </div>
  </aside>

  <!-- ===================== CONTENIDO ===================== -->
  <main class="main">
    <!-- Las páginas se inyectan/poblan vía JS -->
    <section class="page active" id="page-empleados"></section>
    <section class="page" id="page-horarios"></section>
    <section class="page" id="page-marcaciones"></section>
    <section class="page" id="page-descuentos"></section>
    <section class="page" id="page-pagos"></section>
    <section class="page" id="page-libres"></section>
    <section class="page" id="page-calculo"></section>
    <section class="page" id="page-consolidado"></section>
    <section class="page" id="page-boleta"></section>
    <section class="page" id="page-admin"></section>
  </main>
</div>

<script>
/* ================================================================
   SISTEMA DE PLANILLA QUINCENAL  (todo en localStorage, sin backend)
   - Quincena 1: día 1 al 15
   - Quincena 2: día 16 al último día del mes
   ================================================================ */
/* ---------- Claves de almacenamiento ---------- */
const K = {
  emp:'pl_empleados', hor:'pl_horarios', mar:'pl_marcaciones',
  desc:'pl_descuentos', pago:'pl_pagosExtra', libre:'pl_diasLibres',
  considerarHE:'pl_considerarHE', seed:'pl_seedDone'
};
const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const TIPOS_DESC = ['Adelanto','Comida','Falta','Rotura','Error de cobro','No marcación','Otros'];
const TIPOS_PAGO = ['Bono','Feriado','Bono de caja','Otros'];
const TIPOS_LIBRE = ['Día libre','Vacaciones'];

/* ---------- Helpers de localStorage ---------- */
const load = (k)=>{ try{ return JSON.parse(localStorage.getItem(k)) || []; }catch(e){ return []; } };
const save = (k,v)=> localStorage.setItem(k, JSON.stringify(v));
const uid = ()=> Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* Preferencia por día: ¿incluir pago por horas extra en la quincena? (default: sí) */
function loadConsiderarHE(){
  try{ return JSON.parse(localStorage.getItem(K.considerarHE)) || {}; }catch(e){ return {}; }
}
function saveConsiderarHE(map){ localStorage.setItem(K.considerarHE, JSON.stringify(map)); }
let CONSIDERAR_HE = loadConsiderarHE();
let calcPendingHE = {}; // cambios pendientes de guardar en Cálculo quincenal
function heKey(empId, fecha){ return empId+'|'+fecha; }
function getConsiderarHoraExtra(empId, fecha){
  const k = heKey(empId, fecha);
  if(Object.prototype.hasOwnProperty.call(calcPendingHE, k)) return calcPendingHE[k];
  return CONSIDERAR_HE[k] !== false;
}
function hasPendingConsiderarHE(){ return Object.keys(calcPendingHE).length > 0; }
function excelTimestamp(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function considerarHEToRows(){
  return Object.entries(CONSIDERAR_HE).map(([k, v])=>{
    const sep = k.indexOf('|');
    return { empleadoId: k.slice(0, sep), fecha: k.slice(sep + 1), considerar: v ? 1 : 0 };
  });
}
function loadConsiderarHEFromRows(rows){
  CONSIDERAR_HE = {};
  (rows || []).forEach(r=>{
    if(!r.empleadoId || !r.fecha) return;
    const considerar = !(r.considerar === 0 || r.considerar === '0' || r.considerar === false || String(r.considerar).toLowerCase() === 'false');
    const k = heKey(String(r.empleadoId), String(r.fecha));
    if(!considerar) CONSIDERAR_HE[k] = false;
  });
  saveConsiderarHE(CONSIDERAR_HE);
  calcPendingHE = {};
}

/* Estado en memoria (se sincroniza con localStorage) */
let S = { emp:[], hor:[], mar:[], desc:[], pago:[], libre:[] };
function reloadState(){
  S.emp=load(K.emp); S.hor=load(K.hor); S.mar=load(K.mar);
  S.desc=load(K.desc); S.pago=load(K.pago); S.libre=load(K.libre);
}

/* ---------- Utilidades de tiempo y fecha ---------- */
// Convierte "HH:MM" a minutos desde medianoche
function hmToMin(hm){ if(!hm) return null; const [h,m]=hm.split(':').map(Number); return h*60+(m||0); }
// Minutos -> "HH:MM"
function minToHm(min){ const h=Math.floor(min/60), m=Math.round(min%60); return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
// Diferencia de horas entre entrada y salida (decimal)
function diffHoras(entrada, salida){
  const a=hmToMin(entrada), b=hmToMin(salida);
  if(a==null||b==null) return 0;
  let d=b-a; if(d<0) d+=24*60; // por si cruza medianoche
  return d/60;
}
// Día de la semana (0=Dom..6=Sab) de "YYYY-MM-DD"
function diaSemana(fecha){ const [y,m,d]=fecha.split('-').map(Number); return new Date(y,m-1,d).getDay(); }
// Formato moneda
const money = (n)=> 'S/ ' + (Number(n)||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const round0 = (n)=> Math.round(Number(n)||0); // redondeo a horas completas
function fmtFecha(f){ const [y,m,d]=f.split('-'); return `${d}/${m}/${y}`; }
function nombreEmp(id){ const e=S.emp.find(x=>x.id===id); return e? e.nombre : '—'; }

// Último día del mes (number)
function ultimoDia(year, month){ return new Date(year, month, 0).getDate(); }
// Rango de fechas (array "YYYY-MM-DD") de la quincena
function rangoQuincena(year, month, q){
  const ini = q==1 ? 1 : 16;
  const fin = q==1 ? 15 : ultimoDia(year, month);
  const out=[];
  for(let d=ini; d<=fin; d++){
    out.push(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  return out;
}
// ¿fecha dentro de la quincena seleccionada?
function enQuincena(fecha, year, month, q){
  const [y,m,d]=fecha.split('-').map(Number);
  if(y!==year || m!==month) return false;
  return q==1 ? (d>=1 && d<=15) : (d>=16);
}

/* ---------- Toasts (mensajes de éxito / error / advertencia) ---------- */
function toast(msg, type='info'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(40px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

/* ---------- Navegación entre módulos ---------- */
const RENDERERS = {};
let currentPage='empleados';
function goto(page){
  currentPage=page;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav').classList.remove('open');
  if(RENDERERS[page]) RENDERERS[page]();
}
document.getElementById('nav').addEventListener('click', e=>{
  const b=e.target.closest('button[data-page]'); if(b) goto(b.dataset.page);
});
document.getElementById('navToggle').addEventListener('click', ()=> document.getElementById('nav').classList.toggle('open'));

/* ---------- Colapsar / expandir el panel lateral ---------- */
const sidebarEl = document.querySelector('.sidebar');
const collapseBtn = document.getElementById('collapseBtn');
if(localStorage.getItem('pl_collapsed')==='1') sidebarEl.classList.add('collapsed');
collapseBtn.textContent = sidebarEl.classList.contains('collapsed') ? '»' : '«';
collapseBtn.addEventListener('click', ()=>{
  const colapsado = sidebarEl.classList.toggle('collapsed');
  collapseBtn.textContent = colapsado ? '»' : '«';
  collapseBtn.title = colapsado ? 'Expandir menú' : 'Colapsar menú';
  localStorage.setItem('pl_collapsed', colapsado ? '1' : '0');
});

/* ================================================================
   REGLAS DE CÁLCULO (funciones puras)
   ================================================================ */

// Horas efectivas trabajadas (en horas completas), con redondeo por reglas:
//  - ENTRADA: si el ingreso pasa de los :30 min, esa hora NO cuenta como
//    trabajada (se redondea la entrada hacia la hora siguiente).
//    Ej.: ingreso 13:31 -> empieza a contar desde las 14:00.
//  - SALIDA: si la salida es antes de los :30 min, esa hora NO cuenta
//    (se redondea la salida hacia la hora anterior).
//    Ej.: salida 22:27 -> cuenta hasta las 22:00.
// Si falta la entrada o la salida => 0.
function calcHorasEfectivas(entradaReal, salidaReal){
  if(!entradaReal || !salidaReal) return 0;
  const inMin = hmToMin(entradaReal), outMin = hmToMin(salidaReal);
  const inRem = inMin % 60;
  const inEff  = (inMin - inRem) + (inRem > 30 ? 60 : 0);  // entrada: >:30 sube a la hora siguiente
  const outRem = outMin % 60;
  const outEff = (outMin - outRem) + (outRem < 30 ? 0 : 60); // salida: <:30 baja a la hora anterior
  let diff = outEff - inEff;
  if(diff < 0) diff += 24*60; // por si cruza medianoche
  return diff/60; // ya queda en horas completas
}

// Horas que debería trabajar según el horario del día. 0 si día libre/vacación.
function calcHorasProgramadas(empleadoId, fecha){
  if(esDiaLibre(empleadoId, fecha)) return 0;
  const h = getHorario(empleadoId, diaSemana(fecha));
  if(!h || h.libre || !h.entrada || !h.salida) return 0;
  return round0(diffHoras(h.entrada, h.salida));
}

// Descuento por tardanza (en HORAS):
//  > 30 min tarde  => 1 hora
//  cada bloque adicional de 60 min después de los primeros 30 => +1 hora
//  (>30=>1, >90=>2, >150=>3, ...)
function calcHorasTardanza(entradaReal, entradaProg){
  const real=hmToMin(entradaReal), prog=hmToMin(entradaProg);
  if(real==null||prog==null) return 0;
  const tarde = real - prog;
  if(tarde <= 30) return 0;
  return 1 + Math.floor((tarde - 30) / 60);
}

// Descuento por salida anticipada (en HORAS):
//  > 30 min antes => 1 hora
//  cada bloque adicional de 60 min => +1 hora
function calcHorasSalidaAnt(salidaReal, salidaProg){
  const real=hmToMin(salidaReal), prog=hmToMin(salidaProg);
  if(real==null||prog==null) return 0;
  const antes = prog - real;
  if(antes <= 30) return 0;
  return 1 + Math.floor((antes - 30) / 60);
}

// Horas extra: si efectivas > programadas, la diferencia redondeada a horas.
function calcHorasExtra(efectivas, programadas){
  const ex = efectivas - programadas;
  return ex > 0 ? round0(ex) : 0;
}

/* ---------- Accesores auxiliares ---------- */
function getHorario(empleadoId, dia){ return S.hor.find(h=>h.empleadoId===empleadoId && h.dia===dia); }
function getMarcacion(empleadoId, fecha){ return S.mar.find(m=>m.empleadoId===empleadoId && m.fecha===fecha); }
function esDiaLibre(empleadoId, fecha){ return S.libre.some(l=>l.empleadoId===empleadoId && l.fecha===fecha); }
function tipoDiaLibre(empleadoId, fecha){ const l=S.libre.find(x=>x.empleadoId===empleadoId && x.fecha===fecha); return l? l.tipo : null; }

/* Calcula la fila diaria completa de un empleado para una fecha */
function calcDia(emp, fecha){
  const mar = getMarcacion(emp.id, fecha);
  const entradaReal = mar? mar.entradaReal : null;
  let salidaReal    = mar? mar.salidaReal  : null;
  const libre = esDiaLibre(emp.id, fecha);
  const tipoLibre = tipoDiaLibre(emp.id, fecha);
  const hor = getHorario(emp.id, diaSemana(fecha));

  const horasProg = calcHorasProgramadas(emp.id, fecha);

  // ¿hay día laboral configurado?
  const debeTrabajar = !libre && hor && !hor.libre && hor.entrada && hor.salida;

  // REGLAS ESPECIALES SOLO para el día 15 y el último día del mes (días de pago):
  //  - Si NO hay marcación de ENTRADA (y no es libre/vacaciones) => se asume FALTA.
  //  - Si hay entrada pero falta la SALIDA => se asume que salió a la hora de su horario.
  const [pY,pM,pD] = fecha.split('-').map(Number);
  const esPayday = (pD === 15) || (pD === ultimoDia(pY, pM));
  let salidaAsumida = false;
  if(esPayday && debeTrabajar && entradaReal && !salidaReal){
    salidaReal = hor.salida; salidaAsumida = true;
  }

  // FALTA (ausencia): día normal => sin entrada NI salida. Día de pago => basta que falte la ENTRADA.
  //   El descuento es: horas programadas del día x sueldo por hora.
  //   Nunca cuenta como falta si el día es libre o vacaciones (debeTrabajar lo contempla).
  const esFalta = debeTrabajar && (esPayday ? !entradaReal : (!entradaReal && !salidaReal));
  // FALTA DE MARCACIÓN: falta UNA sola marcación (entrada o salida, no ambas) y no es falta total.
  //   Su descuento (1h) se aplica desde la 2da omisión de la quincena (ver calcQuincenaEmpleado).
  const faltaMarc = debeTrabajar && !esFalta && ((!!entradaReal) !== (!!salidaReal));

  const horasEf = esFalta ? 0 : calcHorasEfectivas(entradaReal, salidaReal);

  // En días libres/vacaciones NO se aplica descuento por tardanza ni por falta.
  let hTard=0, hSal=0;
  if(!libre && debeTrabajar && !esFalta){
    if(entradaReal) hTard = calcHorasTardanza(entradaReal, hor.entrada);
    if(salidaReal)  hSal  = calcHorasSalidaAnt(salidaReal, hor.salida);
  }
  // Descuento por falta (ausencia) = horas programadas x sueldo/hora
  const descFalta = esFalta ? horasProg * (emp.sueldoHora||0) : 0;
  const horasDescAuto = hTard + hSal;
  const descAuto = horasDescAuto * (emp.sueldoHora||0) + descFalta;

  const horasExtra = calcHorasExtra(horasEf, horasProg);
  const pagoExtraHoras = horasExtra * (emp.sueldoHora||0);

  // descuentos y pagos manuales registrados en esa fecha
  const descManualList = S.desc.filter(d=>d.empleadoId===emp.id && d.fecha===fecha);
  const pagoExtraList = S.pago.filter(p=>p.empleadoId===emp.id && p.fecha===fecha);
  const descManual = descManualList.reduce((s,d)=>s+(Number(d.monto)||0),0);
  const pagoManual = pagoExtraList.reduce((s,p)=>s+(Number(p.monto)||0),0);

  // Total diario informativo: pagos extra + horas extra - descuentos del día
  const totalDia = pagoManual + pagoExtraHoras - descManual - descAuto;

  return {
    fecha, entradaReal, salidaReal, horasEf, horasProg, horasExtra,
    hTard, hSal, horasDescAuto, descAuto, descFalta, descManual, pagoManual, pagoExtraHoras,
    descManualList, pagoExtraList, faltaMarc, esFalta, salidaAsumida, esPayday, libre, tipoLibre, debeTrabajar, totalDia
  };
}

/* Resumen quincenal de un empleado (suma de días + sueldo base) */
function calcQuincenaEmpleado(emp, year, month, q){
  const dias = rangoQuincena(year, month, q).map(f=>{
    const d = calcDia(emp, f);
    d.considerarHoraExtra = getConsiderarHoraExtra(emp.id, f);
    if(!d.considerarHoraExtra && d.pagoExtraHoras > 0){
      d.totalDia -= d.pagoExtraHoras;
      d.pagoExtraHoras = 0;
    }
    return d;
  });

  // Descuento por FALTA DE MARCACIÓN (una sola marcación faltante, no ausencia total):
  // solo aplica si ocurre MÁS DE UNA VEZ en la quincena y se contabiliza desde la
  // 2da omisión (la 1ra no se descuenta). Cada omisión a partir de la 2da = 1 hora.
  let faltasVistas = 0;
  dias.forEach(d=>{               // 'dias' va en orden cronológico
    d.horasFaltaMarc = 0; d.descFaltaMarc = 0;
    if(d.faltaMarc){
      faltasVistas++;
      if(faltasVistas > 1){       // a partir de la 2da omisión
        d.horasFaltaMarc = 1;
        d.descFaltaMarc = emp.sueldoHora || 0;
        d.horasDescAuto += d.horasFaltaMarc;
        d.descAuto += d.descFaltaMarc;
        d.totalDia -= d.descFaltaMarc;
      }
    }
  });

  const tot = dias.reduce((a,d)=>({
    horasEf:a.horasEf+d.horasEf, horasProg:a.horasProg+d.horasProg, horasExtra:a.horasExtra+d.horasExtra,
    descAuto:a.descAuto+d.descAuto, descManual:a.descManual+d.descManual,
    pagoManual:a.pagoManual+d.pagoManual, pagoExtraHoras:a.pagoExtraHoras+d.pagoExtraHoras
  }), {horasEf:0,horasProg:0,horasExtra:0,descAuto:0,descManual:0,pagoManual:0,pagoExtraHoras:0});

  const base = Number(emp.sueldoQuincenal)||0;
  // Total = base + pagos extra + pago horas extra - desc. manuales - desc. automáticos
  const totalPagar = base + tot.pagoManual + tot.pagoExtraHoras - tot.descManual - tot.descAuto;
  return { dias, tot, base, totalPagar };
}

// Convierte un serial de Excel (o Date/string) a {fecha:'YYYY-MM-DD', hm:'HH:MM'}
function parseExcelTS(v){
  let dt;
  if(typeof v === 'number'){
    // epoch de Excel: 1899-12-30. Usamos parser de SheetJS si está disponible.
    if(window.XLSX && XLSX.SSF && XLSX.SSF.parse_date_code){
      const o = XLSX.SSF.parse_date_code(v);
      dt = new Date(o.y, o.m-1, o.d, o.H, o.M, Math.floor(o.S||0));
    }else{
      dt = new Date(Math.round((v - 25569) * 86400 * 1000));
    }
  }else if(v instanceof Date){ dt = v; }
  else { dt = new Date(v); }
  if(isNaN(dt)) return null;
  const fecha = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  const hm = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
  return {fecha, hm};
}
function findEmpByName(name){
  const n=(name||'').trim().toLowerCase();
  return S.emp.find(e=>e.nombre.trim().toLowerCase()===n);
}

function importarExcel(){
  const f = document.getElementById('fileXlsx').files[0];
  if(!f){ toast('Selecciona un archivo .xlsx','error'); return; }
  const reemplazar = document.getElementById('impReemplaza').checked;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
      // detectar fila de encabezado (busca "marca"/"nombre"/"tipo")
      let start = 0;
      if(rows.length && rows[0].some(c=> typeof c==='string' && /marca|nombre|tipo/i.test(c))) start = 1;

      // agrupado: clave empleado|fecha -> {entradas:[], salidas:[]}
      const grupos = {};
      importNoRecon = [];
      let leidas=0;
      for(let i=start; i<rows.length; i++){
        const r=rows[i]; if(!r) continue;
        const ts=r[0], nombre=r[1], tipo=(r[2]||'').toString().trim().toLowerCase();
        if(ts==null || !nombre) continue;
        const emp = findEmpByName(nombre);
        if(!emp){ if(!importNoRecon.includes(nombre)) importNoRecon.push(nombre); continue; }
        const p = parseExcelTS(ts); if(!p) continue;
        leidas++;
        const key = emp.id+'|'+p.fecha;
        if(!grupos[key]) grupos[key]={empleadoId:emp.id, fecha:p.fecha, entradas:[], salidas:[]};
        if(tipo.startsWith('sal')) grupos[key].salidas.push(p.hm);
        else grupos[key].entradas.push(p.hm); // por defecto Entrada
      }

      if(reemplazar) S.mar = [];
      let nuevas=0, actualizadas=0;
      Object.values(grupos).forEach(g=>{
        const entradaReal = g.entradas.length? g.entradas.sort()[0] : null;       // entrada más temprana
        const salidaReal  = g.salidas.length? g.salidas.sort().slice(-1)[0] : null; // salida más tardía
        let m = getMarcacion(g.empleadoId, g.fecha);
        if(m){ m.entradaReal=entradaReal; m.salidaReal=salidaReal; actualizadas++; }
        else { S.mar.push({id:uid(), empleadoId:g.empleadoId, fecha:g.fecha, entradaReal, salidaReal}); nuevas++; }
      });
      save(K.mar,S.mar);

      let msg = `<div class="card" style="background:#f0fdf4;border-color:#bbf7d0">
        <b>✔ Importación completa.</b> Filas leídas: ${leidas}. Marcaciones nuevas: ${nuevas}, actualizadas: ${actualizadas}.`;
      if(importNoRecon.length){
        msg += `<div style="margin-top:10px"><b>⚠ Nombres no reconocidos:</b> ${importNoRecon.join(', ')}.
          <br>Crea estos empleados (mismo nombre) y vuelve a importar para incluirlos.</div>`;
      }
      msg += `</div>`;
      RENDERERS.marcaciones();
      document.getElementById('importMsg').innerHTML = msg;
      toast('Excel importado correctamente','success');
    }catch(err){
      console.error(err);
      toast('Error al leer el Excel: '+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(f);
}

// Devuelve un array de fechas "YYYY-MM-DD" entre ini y fin (inclusive)
function rangoFechas(ini, fin){
  const out=[]; const [y,m,d]=ini.split('-').map(Number); const cur=new Date(y,m-1,d);
  const [y2,m2,d2]=fin.split('-').map(Number); const end=new Date(y2,m2-1,d2);
  while(cur<=end){ out.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`); cur.setDate(cur.getDate()+1); }
  return out;
}

const _now = new Date();
let PER = { year:_now.getFullYear(), month:_now.getMonth()+1, q:(_now.getDate()<=15?1:2) };
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function periodSelector(prefix){
  const years=[]; for(let y=_now.getFullYear()-2; y<=_now.getFullYear()+1; y++) years.push(y);
  return `
    <div class="field"><label>Mes</label><select id="${prefix}Mes">${MESES.map((m,i)=>`<option value="${i+1}" ${i+1===PER.month?'selected':''}>${m}</option>`).join('')}</select></div>
    <div class="field"><label>Año</label><select id="${prefix}Anio">${years.map(y=>`<option ${y===PER.year?'selected':''}>${y}</option>`).join('')}</select></div>
    <div class="field"><label>Quincena</label><select id="${prefix}Q"><option value="1" ${PER.q==1?'selected':''}>1ª (1 al 15)</option><option value="2" ${PER.q==2?'selected':''}>2ª (16 a fin de mes)</option></select></div>`;
}
function readPeriod(prefix){
  PER.month=+document.getElementById(prefix+'Mes').value;
  PER.year=+document.getElementById(prefix+'Anio').value;
  PER.q=+document.getElementById(prefix+'Q').value;
}

    <div id="calcOut"></div>`;
  document.getElementById('cGen').onclick=()=>{ readPeriod('c'); calcEmpSel=document.getElementById('cEmp').value; renderCalculo(); };
  document.getElementById('cEmp').onchange=(e)=>{ readPeriod('c'); calcEmpSel=e.target.value; renderCalculo(); };

  renderCalculo();

function calcGuardarConsiderarHE(){
  if(!hasPendingConsiderarHE()){ toast('No hay cambios pendientes','info'); return; }
  Object.entries(calcPendingHE).forEach(([k, v])=>{
    if(v) delete CONSIDERAR_HE[k];
    else CONSIDERAR_HE[k] = false;
  });
  calcPendingHE = {};
  saveConsiderarHE(CONSIDERAR_HE);
  toast('Preferencias de horas extra guardadas','success');
  renderCalculo();
}

  const btn = document.getElementById('cSaveHE');

  if(!btn || !card) return;
  btn.disabled = !hasPendingConsiderarHE();
  let hint = card.querySelector('.calc-he-hint');
  if(hasPendingConsiderarHE()){
    if(!hint){

function renderCalculo(){
  const out=document.getElementById('calcOut');
  if(!S.emp.length){ out.innerHTML=noEmpWarning(); return; }
  const titulo=`${MESES[PER.month-1]} ${PER.year} · ${PER.q==1?'1ª quincena (1-15)':'2ª quincena (16-fin)'}`;
  let html=`<div class="card" style="background:#fdeef1;border-color:#f6c4ce"><b>Periodo:</b> ${titulo}</div>`;

  const emps = calcEmpSel? S.emp.filter(e=>e.id===calcEmpSel) : S.emp;
  emps.forEach(emp=>{
    const r=calcQuincenaEmpleado(emp, PER.year, PER.month, PER.q);
    const filas=r.dias.map(d=>{
      let cls=''; if(d.libre)cls='row-vac'; else if(d.esFalta||d.faltaMarc)cls='row-miss';
      const detDescAuto=[];
      if(d.esFalta) detDescAuto.push(`Falta - ausencia (${d.horasProg}h prog.)`);
      if(d.hTard>0) detDescAuto.push(`Tardanza (${d.hTard}h)`);
      if(d.hSal>0) detDescAuto.push(`Salida anticipada (${d.hSal}h)`);
      if(d.horasFaltaMarc>0) detDescAuto.push(`Falta marcación (${d.horasFaltaMarc}h)`);
      const detDesc=[...detDescAuto, ...d.descManualList.map(x=>`${x.tipo}: ${money(x.monto)}`)].join('<br>');
      const detPago=d.pagoExtraList.map(x=>`${x.tipo}: ${money(x.monto)}`).join('<br>') || '';
      let estado='';
      if(d.libre) estado=`<span class="badge ${d.tipoLibre==='Vacaciones'?'b-vac':'b-free'}">${d.tipoLibre}</span>`;
      else if(d.esFalta) estado='<span class="badge b-miss">⛔ Falta</span>';
      else if(d.faltaMarc) estado='<span class="badge b-miss">⚠ Falta marcación</span>';
      else if(d.hTard>0||d.hSal>0) estado='<span class="badge b-late">Tardanza/Salida</span>';
      const heChecked = getConsiderarHoraExtra(emp.id, d.fecha);
      const hePending = Object.prototype.hasOwnProperty.call(calcPendingHE, heKey(emp.id, d.fecha));
      return `<tr class="${cls}">
        <td>${fmtFecha(d.fecha)}<br><small style="color:var(--c-muted)">${DIAS[diaSemana(d.fecha)]}</small></td>
        <td>${d.entradaReal||'<span class="badge b-miss">—</span>'}</td>
        <td>${d.salidaReal? (d.salidaReal+(d.salidaAsumida?' <span class="badge b-free">horario</span>':'')) : '<span class="badge b-miss">—</span>'}</td>
        <td class="num">${d.horasEf}</td>
        <td class="num">${d.horasProg}</td>
        <td class="num">${d.horasExtra?('+'+d.horasExtra):'0'}</td>
        <td style="text-align:center;white-space:normal">
          <label title="Incluir pago por horas extra en la quincena">
            <input type="checkbox" ${heChecked?'checked':''} onchange="calcSetConsiderarHE('${emp.id}','${d.fecha}', this.checked)">
            Considerar hora extra${hePending ? ' <span class="badge b-late">sin guardar</span>' : ''}
          </label>
        </td>
        <td class="num">${d.descAuto>0?money(d.descAuto):'—'}<br><small style="color:var(--c-muted)">${d.esFalta?('Falta '+d.horasProg+'h'):(d.horasDescAuto>0?(d.horasDescAuto+'h'+(d.horasFaltaMarc>0?' (incl. falta marc.)':'')):'')}</small></td>
        <td class="num">${d.descManual>0?money(d.descManual):'—'}</td>
        <td class="num">${(d.pagoManual+d.pagoExtraHoras)>0?money(d.pagoManual+d.pagoExtraHoras):'—'}</td>
        <td style="white-space:normal;max-width:160px">${detDesc||'—'}</td>
        <td style="white-space:normal;max-width:160px">${detPago||'—'}</td>
        <td class="num"><b>${money(d.totalDia)}</b></td>
        <td>${estado}</td>
      </tr>`;
    }).join('');

    html+=`<div class="card emp-block">
      <div class="emp-title">👤 ${emp.nombre} <small style="color:var(--c-muted);font-weight:400">(${emp.documento})</small></div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Fecha</th><th>Ent. real</th><th>Sal. real</th><th class="num">H. efectivas</th>
          <th class="num">H. programadas</th><th class="num">H. extra</th><th>Considerar hora extra</th><th class="num">Desc. auto</th>
          <th class="num">Desc. manual</th><th class="num">Pagos extra</th><th>Detalle descuento</th>
          <th>Detalle pago</th><th class="num">Total día</th><th>Estado</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table></div>
      <div class="summary">
        <div class="item"><div class="l">Sueldo quincenal base</div><div class="v">${money(r.base)}</div></div>
        <div class="item"><div class="l">Desc. automáticos</div><div class="v" style="color:var(--red)">- ${money(r.tot.descAuto)}</div></div>
        <div class="item"><div class="l">Desc. manuales</div><div class="v" style="color:var(--red)">- ${money(r.tot.descManual)}</div></div>
        <div class="item"><div class="l">Pagos extra</div><div class="v" style="color:var(--green)">+ ${money(r.tot.pagoManual)}</div></div>
        <div class="item"><div class="l">Total horas extra (${r.tot.horasExtra}h)</div><div class="v" style="color:var(--green)">+ ${money(r.tot.pagoExtraHoras)}</div></div>
        <div class="item total"><div class="l">Total a pagar quincena</div><div class="v">${money(r.totalPagar)}</div></div>
      </div>
    </div>`;
  });
  out.innerHTML=html;
  updateCalcSaveHEUI();
}
window.calcSetConsiderarHE = function(empId, fecha, checked){
  const k = heKey(empId, fecha);
  const saved = CONSIDERAR_HE[k] !== false;
  if(checked === saved) delete calcPendingHE[k];
  else calcPendingHE[k] = checked;
  renderCalculo();
};

function renderConsolidado(){

  if(!S.emp.length){ out.innerHTML=noEmpWarning(); return; }
  _consolidado = S.emp.map(emp=>{
    const r=calcQuincenaEmpleado(emp, PER.year, PER.month, PER.q);
    const sueldoPlanilla = Number(emp.sueldoPlanilla)||0;
    // Sueldo transferencia = Total a pagar - Sueldo planilla
    const sueldoTransfer = r.totalPagar - sueldoPlanilla;
    return {nombre:emp.nombre, base:r.base, horasEf:r.tot.horasEf, horasProg:r.tot.horasProg,

  const T=_consolidado.reduce((a,c)=>({
    base:a.base+c.base, horasExtra:a.horasExtra+c.horasExtra, pagoExtraHoras:a.pagoExtraHoras+c.pagoExtraHoras,

    sueldoPlanilla:a.sueldoPlanilla+c.sueldoPlanilla, sueldoTransfer:a.sueldoTransfer+c.sueldoTransfer

      <div class="kpi green"><div class="label">Total horas extra</div><div class="value">${money(T.pagoExtraHoras)}</div></div>
      <div class="kpi red"><div class="label">Total descuentos</div><div class="value">${money(T.descAuto+T.descManual)}</div></div>
      <div class="kpi green"><div class="label">Total pagos extra</div><div class="value">${money(T.pagoManual)}</div></div>
      <div class="kpi blue"><div class="label">Total sueldo planilla</div><div class="value">${money(T.sueldoPlanilla)}</div></div>
      <div class="kpi blue"><div class="label">Total sueldo transferencia</div><div class="value">${money(T.sueldoTransfer)}</div></div>
      <div class="kpi violet"><div class="label">Total general a pagar</div><div class="value">${money(T.total)}</div></div>
    </div>
    <div class="card">
      <h2>Consolidado · ${titulo}</h2>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Empleado</th><th class="num">Sueldo base</th><th class="num">H. trabajadas</th><th class="num">H. programadas</th>
          <th class="num">H. extra</th><th class="num">Pago h. extra</th><th class="num">Desc. auto</th>
          <th class="num">Desc. manual</th><th class="num">Pagos extra</th>
          <th class="num">Sueldo planilla</th><th class="num">Sueldo transferencia</th><th class="num">Total a pagar</th>
        </tr></thead>
        <tbody>${_consolidado.map(c=>`<tr>
          <td>${c.nombre}</td><td class="num">${money(c.base)}</td><td class="num">${c.horasEf}</td><td class="num">${c.horasProg}</td>
          <td class="num">${c.horasExtra}</td><td class="num">${money(c.pagoExtraHoras)}</td>
          <td class="num" style="color:var(--red)">${money(c.descAuto)}</td><td class="num" style="color:var(--red)">${money(c.descManual)}</td>
          <td class="num" style="color:var(--green)">${money(c.pagoManual)}</td>
          <td class="num">${money(c.sueldoPlanilla)}</td><td class="num">${money(c.sueldoTransfer)}</td><td class="num"><b>${money(c.total)}</b></td>
        </tr>`).join('')}</tbody>
        <tfoot><tr>
          <td>TOTALES</td><td class="num">${money(T.base)}</td><td class="num">—</td><td class="num">—</td>
          <td class="num">${T.horasExtra}</td><td class="num">${money(T.pagoExtraHoras)}</td>
          <td class="num">${money(T.descAuto)}</td><td class="num">${money(T.descManual)}</td>
          <td class="num">${money(T.pagoManual)}</td>
          <td class="num">${money(T.sueldoPlanilla)}</td><td class="num">${money(T.sueldoTransfer)}</td><td class="num">${money(T.total)}</td>
        </tr></tfoot>
      </table></div>
    </div>`;
}
/* ---------- Exportación a CSV ---------- */
function exportarCSV(){
  if(!_consolidado.length){ toast('Genera el consolidado primero','error'); return; }
  const head=['Empleado','Sueldo base','Horas trabajadas','Horas programadas','Horas extra','Pago horas extra','Descuentos automaticos','Descuentos manuales','Pagos extra','Sueldo planilla','Sueldo transferencia','Total a pagar'];
  const rows=_consolidado.map(c=>[c.nombre,c.base,c.horasEf,c.horasProg,c.horasExtra,c.pagoExtraHoras,c.descAuto,c.descManual,c.pagoManual,c.sueldoPlanilla,c.sueldoTransfer,c.total]);
  const T=_consolidado.reduce((a,c)=>({base:a.base+c.base,he:a.he+c.horasExtra,phe:a.phe+c.pagoExtraHoras,da:a.da+c.descAuto,dm:a.dm+c.descManual,pm:a.pm+c.pagoManual,sp:a.sp+c.sueldoPlanilla,st:a.st+c.sueldoTransfer,t:a.t+c.total}),{base:0,he:0,phe:0,da:0,dm:0,pm:0,sp:0,st:0,t:0});
  rows.push(['TOTALES',T.base,'','',T.he,T.phe,T.da,T.dm,T.pm,T.sp,T.st,T.t]);
  const csv=[head,...rows].map(r=>r.map(v=>{ const s=String(v).replace(/"/g,'""'); return /[",;\n]/.test(s)?`"${s}"`:s; }).join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`consolidado_${PER.year}_${String(PER.month).padStart(2,'0')}_Q${PER.q}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV exportado','success');
}

function renderBoleta(){
  const out=document.getElementById('boletaOut');
  const emp=S.emp.find(e=>e.id===boletaEmpSel); if(!emp){ out.innerHTML=''; return; }
  const r=calcQuincenaEmpleado(emp, PER.year, PER.month, PER.q);

  // ----- Detalle de pagos -----
  const pagosRows=[];
  pagosRows.push(['Sueldo quincenal base', r.base]);
  // Detalle de horas extra POR DÍA (cuando hay pago por horas extra)
  r.dias.forEach(d=>{ if(d.pagoExtraHoras>0) pagosRows.push([`${fmtFecha(d.fecha)} · Horas extra (${d.horasExtra}h)`, d.pagoExtraHoras]); });
  r.dias.forEach(d=> d.pagoExtraList.forEach(p=> pagosRows.push([`${fmtFecha(d.fecha)} · ${p.tipo}${p.detalle?(' ('+p.detalle+')'):''}`, Number(p.monto)||0])));
  const subtotalPagos = r.base + r.tot.pagoExtraHoras + r.tot.pagoManual;

  // ----- Detalle de descuentos -----
  const descRows=[];
  r.dias.forEach(d=>{
    const motivos=[];
    if(d.esFalta) motivos.push(`Falta - ausencia (${d.horasProg}h)`);
    if(d.hTard>0) motivos.push(`Tardanza ${d.hTard}h`);
    if(d.hSal>0) motivos.push(`Salida anticipada ${d.hSal}h`);
    if(d.horasFaltaMarc>0) motivos.push(`Falta de marcación ${d.horasFaltaMarc}h`);
    if(motivos.length) descRows.push([`${fmtFecha(d.fecha)} · ${motivos.join(', ')}`, d.descAuto - 0]); // desc automático del día
    d.descManualList.forEach(x=> descRows.push([`${fmtFecha(d.fecha)} · ${x.tipo}${x.detalle?(' ('+x.detalle+')'):''}`, Number(x.monto)||0]));
  });
  const subtotalDesc = r.tot.descAuto + r.tot.descManual;

  const sueldoPlanilla = Number(emp.sueldoPlanilla)||0;
  const sueldoTransfer = r.totalPagar - sueldoPlanilla;
  const titulo=`${MESES[PER.month-1]} ${PER.year} · ${PER.q==1?'1ª quincena (1-15)':'2ª quincena (16-fin)'}`;

  out.innerHTML=`
    <div class="card">
      <div class="emp-title">👤 ${emp.nombre} <small style="color:var(--c-muted);font-weight:400">(${emp.documento})</small></div>
      <p class="hint" style="margin-top:0">Periodo: <b>${titulo}</b></p>

      <h3>Detalle de pagos</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>Concepto</th><th class="num">Monto</th></tr></thead>
        <tbody>${pagosRows.map(([c,m])=>`<tr><td>${c}</td><td class="num" style="color:var(--green)">${money(m)}</td></tr>`).join('')}</tbody>
        <tfoot><tr><td>Sub-total de pagos</td><td class="num">${money(subtotalPagos)}</td></tr></tfoot>
      </table></div>

      <h3>Detalle de descuentos</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>Concepto</th><th class="num">Monto</th></tr></thead>
        <tbody>${descRows.length? descRows.map(([c,m])=>`<tr><td>${c}</td><td class="num" style="color:var(--red)">${money(m)}</td></tr>`).join('') : `<tr><td colspan="2" class="empty">Sin descuentos en la quincena.</td></tr>`}</tbody>
        <tfoot><tr><td>Sub-total de descuentos</td><td class="num">${money(subtotalDesc)}</td></tr></tfoot>
      </table></div>

      <div class="summary">
        <div class="item"><div class="l">Total Sueldo planilla</div><div class="v">${money(sueldoPlanilla)}</div></div>
        <div class="item"><div class="l">Total Sueldo transferencia</div><div class="v">${money(sueldoTransfer)}</div></div>
        <div class="item total"><div class="l">Total a pagar</div><div class="v">${money(r.totalPagar)}</div></div>
      </div>
    </div>`;
}

    PagosExtra:S.pago.map(p=>({id:p.id, empleadoId:p.empleadoId, fecha:p.fecha, tipo:p.tipo, monto:p.monto, detalle:p.detalle||''})),

    ConsiderarHoraExtra: considerarHEToRows()
  };
  Object.entries(sheets).forEach(([name,data])=>{
    const ws=XLSX.utils.json_to_sheet(data.length?data:[{}]);
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, `planilla_datos_${excelTimestamp()}.xlsx`);
  toast('Excel de datos descargado','success');
}

function adminImport(){

  if(!f){ toast('Selecciona un archivo .xlsx','error'); return; }
  if(!confirm('Esto reemplazará Empleados, Horarios, Descuentos, Pagos extra, Días libres/Vacaciones y ConsiderarHoraExtra con el contenido del Excel. ¿Continuar?')) return;
  const reader=new FileReader();

      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const sheet=(name)=>{ const ws=wb.Sheets[name]; return ws? XLSX.utils.sheet_to_json(ws,{defval:null}) : null; };

      const emp=sheet('Empleados'), hor=sheet('Horarios'), desc=sheet('Descuentos'), pago=sheet('PagosExtra'), libre=sheet('DiasLibres'), considerarHE=sheet('ConsiderarHoraExtra');

        entrada:r.entrada?String(r.entrada):'', salida:r.salida?String(r.salida):'' }));
      S.desc = (desc||[]).map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), tipo:String(r.tipo||'Otros'), monto:Number(r.monto)||0, detalle:r.detalle?String(r.detalle):'' }));
      S.pago = (pago||[]).map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), tipo:String(r.tipo||'Otros'), monto:Number(r.monto)||0, detalle:r.detalle?String(r.detalle):'' }));
      S.libre = (libre||[]).map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), tipo:String(r.tipo||'Día libre'), comentario:r.comentario?String(r.comentario):'' }));
      const heCount = (considerarHE||[]).filter(r=>r.empleadoId && r.fecha).length;
      loadConsiderarHEFromRows(considerarHE);

      save(K.emp,S.emp); save(K.hor,S.hor); save(K.desc,S.desc); save(K.pago,S.pago); save(K.libre,S.libre);
      document.getElementById('admMsg').innerHTML=`<div class="card" style="background:#f0fdf4;border-color:#bbf7d0;margin-top:12px">
        <b>✔ Carga completa.</b> Empleados: ${S.emp.length}, Horarios: ${S.hor.length}, Descuentos: ${S.desc.length}, Pagos extra: ${S.pago.length}, Días libres: ${S.libre.length}, Considerar hora extra: ${heCount}.</div>`;
      toast('Datos cargados desde Excel','success');
    }catch(err){
      console.error(err); toast('Error al leer el Excel: '+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(f);
}

/* ================================================================
   INTEGRACIÓN GOOGLE DRIVE / SHEETS
   ----------------------------------------------------------------
   Configuración:
     1. Crea un proyecto en https://console.cloud.google.com
     2. Habilita "Google Sheets API" y "Google Drive API"
     3. Crea credenciales → OAuth 2.0 → Aplicación web
        · Origen autorizado: tu dominio (ej. https://tuusuario.github.io)
        · URI de redirección: mismo dominio
     4. Pega tu Client ID en GD_CLIENT_ID (abajo).
     5. En "Pantalla de consentimiento OAuth" agrega tu correo como
        usuario de prueba si la app sigue en modo "Testing".
   ================================================================ */
const GD_CLIENT_ID = '809499583884-4st99bjc39crnrbhuc1p2ncjp7dnnohp.apps.googleusercontent.com'; // ← reemplaza esto
const GD_SCOPES    = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
const GD_FILE_KEY  = 'pl_gdrive_file_id';   // key localStorage donde se guarda el ID del sheet
const GD_TOKEN_KEY = 'pl_gdrive_token';

let gdToken = null;      // access_token activo
let gdFileId = localStorage.getItem(GD_FILE_KEY) || null;
let gdReady  = false;    // true cuando gapi.client está cargado

/* --- Helpers de UI del bar de Drive --- */
function gdSetStatus(msg, type=''){
  const el = document.getElementById('gdStatus');
  if(!el) return;
  el.textContent = msg;
  el.className = 'gd-status' + (type ? ' '+type : '');
}
function gdUpdateButtons(){
  const connected = !!gdToken;
  const btnC = document.getElementById('gdConnect');
  const btnS = document.getElementById('gdSave');
  const btnL = document.getElementById('gdLoad');
  const btnD = document.getElementById('gdDisconnect');
  if(!btnC) return;
  btnC.style.display   = connected ? 'none' : '';
  btnD.style.display   = connected ? '' : 'none';
  btnS.disabled = !connected;
  btnL.disabled = !connected;
}

/* --- Carga de gapi.client (una sola vez) --- */
function gdLoadGapi(){
  return new Promise((resolve)=>{
    if(typeof gapi === 'undefined'){ setTimeout(()=>gdLoadGapi().then(resolve), 400); return; }
    if(gdReady){ resolve(); return; }
    gapi.load('client', async ()=>{
      await gapi.client.init({});
      await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4');
      gdReady = true;
      resolve();
    });
  });
}

/* --- OAuth con token popup (Google Identity Services) --- */
let gdTokenClient = null;
function gdGetTokenClient(){
  if(gdTokenClient) return gdTokenClient;
  if(typeof google === 'undefined') return null;
  gdTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GD_CLIENT_ID,
    scope: GD_SCOPES,
    callback: (resp)=>{
      if(resp.error){ gdSetStatus('Error: '+resp.error,'err'); return; }
      gdToken = resp.access_token;
      // Guardar token con expiración (1 hora)
      const exp = Date.now() + (resp.expires_in||3600)*1000 - 60000;
      localStorage.setItem(GD_TOKEN_KEY, JSON.stringify({token:gdToken, exp}));
      gapi.client.setToken({access_token:gdToken});
      gdSetStatus('Conectado ✓','ok');
      gdUpdateButtons();
      toast('Google Drive conectado','success');
    },
  });
  return gdTokenClient;
}

/* Intenta recuperar token guardado al iniciar */
function gdTryRestoreToken(){
  try{
    const raw = localStorage.getItem(GD_TOKEN_KEY);
    if(!raw) return;
    const {token, exp} = JSON.parse(raw);
    if(Date.now() < exp && token){
      gdToken = token;
      gdLoadGapi().then(()=>{
        gapi.client.setToken({access_token:gdToken});
        gdSetStatus('Conectado ✓','ok');
        gdUpdateButtons();
      });
    }else{
      localStorage.removeItem(GD_TOKEN_KEY);
    }
  }catch(e){}
}

/* --- Conectar / Desconectar --- */
async function gdConnect(){
  gdSetStatus('Iniciando autenticación…');
  await gdLoadGapi();
  const tc = gdGetTokenClient();
  if(!tc){ gdSetStatus('Error: librería Google no cargada. Revisa que el CLIENT_ID esté configurado.','err'); return; }
  if(GD_CLIENT_ID === 'TU_CLIENT_ID_AQUI.apps.googleusercontent.com'){
    toast('⚠ Configura tu GD_CLIENT_ID en el código primero','error'); return;
  }
  tc.requestAccessToken({prompt:'consent'});
}
function gdDisconnect(){
  if(gdToken) google.accounts.oauth2.revoke(gdToken, ()=>{});
  gdToken = null;
  localStorage.removeItem(GD_TOKEN_KEY);
  gapi.client.setToken(null);
  gdSetStatus('Desconectado');
  gdUpdateButtons();
  toast('Sesión de Google cerrada','warn');
}

/* --- Crear o abrir el Spreadsheet de datos --- */
async function gdEnsureFile(){
  if(gdFileId){
    // Verificar que aún existe
    try{
      const check = await fetch(`https://www.googleapis.com/drive/v3/files/${gdFileId}?fields=id,name,trashed`,
        {headers:{Authorization:'Bearer '+gdToken}});
      const data = await check.json();
      if(data.id && !data.trashed) return gdFileId;
    }catch(e){}
    // No existe, crear uno nuevo
    gdFileId = null;
    localStorage.removeItem(GD_FILE_KEY);
  }
  // Crear nuevo spreadsheet con 6 hojas
  const body = {
    properties:{ title:'Planilla Quincenal – Datos' },
    sheets:[
      {properties:{title:'Empleados'}},
      {properties:{title:'Horarios'}},
      {properties:{title:'Descuentos'}},
      {properties:{title:'PagosExtra'}},
      {properties:{title:'DiasLibres'}},
      {properties:{title:'ConsiderarHoraExtra'}},
      {properties:{title:'Marcaciones'}}
    ]
  };
  const resp = await gapi.client.sheets.spreadsheets.create({resource:body});
  gdFileId = resp.result.spreadsheetId;
  localStorage.setItem(GD_FILE_KEY, gdFileId);
  return gdFileId;
}

/* --- Convertir array de objetos a filas 2D --- */
function toRows(arr, cols){
  if(!arr.length) return [cols];
  return [cols, ...arr.map(obj=>cols.map(c=>{ const v=obj[c]; return v==null?'':v; }))];
}

/* --- Guardar todos los datos en el Sheet --- */
async function gdSave(){
  if(!gdToken){ toast('Conecta Drive primero','error'); return; }
  gdSetStatus('Guardando…');
  document.getElementById('gdSave').disabled = true;
  try{
    await gdLoadGapi();
    const fid = await gdEnsureFile();

    const heRows = toRows(considerarHEToRows(), ['empleadoId','fecha','considerar']);
    const marCols = ['id','empleadoId','fecha','entradaReal','salidaReal'];

    const dataMap = {
      'Empleados':             toRows(S.emp,  ['id','nombre','documento','sueldoQuincenal','sueldoPlanilla','sueldoHora']),
      'Horarios':              toRows(S.hor,  ['empleadoId','dia','libre','entrada','salida']),
      'Descuentos':            toRows(S.desc, ['id','empleadoId','fecha','tipo','monto','detalle']),
      'PagosExtra':            toRows(S.pago, ['id','empleadoId','fecha','tipo','monto','detalle']),
      'DiasLibres':            toRows(S.libre,['id','empleadoId','fecha','tipo','comentario']),
      'ConsiderarHoraExtra':   heRows,
      'Marcaciones':           toRows(S.mar,  marCols)
    };

    // Limpiar y escribir cada hoja
    const clearRanges = Object.keys(dataMap).map(s=>s+'!A:Z');
    await gapi.client.sheets.spreadsheets.values.batchClear({spreadsheetId:fid, resource:{ranges:clearRanges}});

    const valueRanges = Object.entries(dataMap).map(([sheet, rows])=>({
      range: sheet+'!A1', majorDimension:'ROWS', values: rows.map(r=>r.map(String))
    }));
    await gapi.client.sheets.spreadsheets.values.batchUpdate({
      spreadsheetId:fid,
      resource:{ valueInputOption:'RAW', data: valueRanges }
    });

    const now = new Date().toLocaleTimeString('es-PE');
    gdSetStatus(`Guardado ✓ a las ${now}`,'ok');
    toast('Datos guardados en Google Sheets','success');

    // Link al sheet
    localStorage.setItem('pl_gd_last_save', now);
    const linkId = 'gdSheetLink';
    let link = document.getElementById(linkId);
    if(!link){
      link = document.createElement('a');
      link.id = linkId;
      link.target = '_blank';
      link.style.cssText = 'font-size:11px;color:#93c5fd;display:block;margin-top:4px;word-break:break-all';
      document.getElementById('gdBar').appendChild(link);
    }
    link.href = `https://docs.google.com/spreadsheets/d/${fid}/edit`;
    link.textContent = '📄 Abrir Google Sheet';

  }catch(err){
    console.error('gdSave error:', err);
    gdSetStatus('Error al guardar: '+(err.message||err),'err');
    toast('Error al guardar en Drive: '+(err.result?.error?.message||err.message||'desconocido'),'error');
    // Si fue error de auth, limpiar token
    if(err.status===401){ gdToken=null; localStorage.removeItem(GD_TOKEN_KEY); gdUpdateButtons(); }
  }finally{
    document.getElementById('gdSave').disabled = false;
  }
}

/* --- Cargar todos los datos desde el Sheet --- */
async function gdLoad(){
  if(!gdToken){ toast('Conecta Drive primero','error'); return; }
  if(!gdFileId){ toast('Aún no hay datos guardados en Drive. Guarda primero.','error'); return; }
  if(!confirm('Esto reemplazará TODOS los datos locales con los del Google Sheet. ¿Continuar?')) return;
  gdSetStatus('Cargando…');
  document.getElementById('gdLoad').disabled = true;
  try{
    await gdLoadGapi();
    const sheets = ['Empleados','Horarios','Descuentos','PagosExtra','DiasLibres','ConsiderarHoraExtra','Marcaciones'];
    const resp = await gapi.client.sheets.spreadsheets.values.batchGet({
      spreadsheetId: gdFileId,
      ranges: sheets.map(s=>s+'!A:Z'),
      majorDimension:'ROWS'
    });

    function parseSheet(valueRange){
      const rows = (valueRange && valueRange.values) ? valueRange.values : [];
      if(rows.length < 1) return [];
      const headers = rows[0];
      return rows.slice(1).filter(r=>r.some(c=>c!=='')).map(r=>{
        const obj={};
        headers.forEach((h,i)=>{ obj[h]=r[i]??''; });
        return obj;
      });
    }

    const [emp, hor, desc, pago, libre, considerarHE, mar] = resp.result.valueRanges.map(parseSheet);

    if(!emp.length){ toast('El Sheet está vacío o sin datos de Empleados','error'); return; }

    S.emp = emp.map(r=>({ id:String(r.id||uid()), nombre:String(r.nombre||'').trim(), documento:String(r.documento||'').trim(),
      sueldoQuincenal:Number(r.sueldoQuincenal)||0, sueldoPlanilla:Number(r.sueldoPlanilla)||0, sueldoHora:Number(r.sueldoHora)||0 }));
    S.hor = hor.map(r=>({ empleadoId:String(r.empleadoId), dia:Number(r.dia),
      libre:(r.libre==='1'||r.libre==='true'||r.libre===true),
      entrada:r.entrada?String(r.entrada):'', salida:r.salida?String(r.salida):'' }));
    S.desc = desc.map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), tipo:String(r.tipo||'Otros'), monto:Number(r.monto)||0, detalle:r.detalle?String(r.detalle):'' }));
    S.pago = pago.map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), tipo:String(r.tipo||'Otros'), monto:Number(r.monto)||0, detalle:r.detalle?String(r.detalle):'' }));
    S.libre = libre.map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), tipo:String(r.tipo||'Día libre'), comentario:r.comentario?String(r.comentario):'' }));
    S.mar = mar.map(r=>({ id:String(r.id||uid()), empleadoId:String(r.empleadoId), fecha:String(r.fecha), entradaReal:r.entradaReal||null, salidaReal:r.salidaReal||null }));

    loadConsiderarHEFromRows(considerarHE.map(r=>({
      empleadoId:String(r.empleadoId), fecha:String(r.fecha),
      considerar: !(r.considerar==='0'||r.considerar===false||r.considerar==='false')
    })));

    save(K.emp,S.emp); save(K.hor,S.hor); save(K.mar,S.mar);
    save(K.desc,S.desc); save(K.pago,S.pago); save(K.libre,S.libre);

    const now = new Date().toLocaleTimeString('es-PE');
    gdSetStatus(`Cargado ✓ a las ${now}`,'ok');
    toast(`Datos cargados desde Google Sheets. Empleados: ${S.emp.length}, Marcaciones: ${S.mar.length}`, 'success');
    reloadState(); goto(currentPage);

  }catch(err){
    console.error('gdLoad error:', err);
    gdSetStatus('Error al cargar: '+(err.message||err),'err');
    toast('Error al cargar desde Drive: '+(err.result?.error?.message||err.message||'desconocido'),'error');
    if(err.status===401){ gdToken=null; localStorage.removeItem(GD_TOKEN_KEY); gdUpdateButtons(); }
  }finally{
    document.getElementById('gdLoad').disabled = false;
  }
}

/* --- Inicializar botones y restaurar sesión --- */
document.getElementById('gdConnect').onclick    = gdConnect;
document.getElementById('gdSave').onclick       = gdSave;
document.getElementById('gdLoad').onclick       = gdLoad;

// Intentar recuperar token guardado al cargar la página
setTimeout(gdTryRestoreToken, 800); // esperar a que google GIS cargue

// Mostrar link si ya tenemos un file guardado
if(gdFileId){

}

/* ================================================================
   DATOS DE EJEMPLO  (los 10 empleados del Excel adjunto)
   ================================================================ */
function seedData(){
  const nombres=['Alex','Maria','Elena','Pier','Marco','Luis','Naruto','Cesar','Diego','Wen'];
  S.emp=[]; S.hor=[]; S.mar=[]; S.desc=[]; S.pago=[]; S.libre=[];
  nombres.forEach((n,i)=>{
    const id=uid();
    const sueldoQ = 2000 + (i%4)*50;          // sueldo quincenal de ejemplo
    const sueldoH = +(sueldoQ/120).toFixed(2); // ~120 h por quincena
    const sueldoP = +(sueldoQ*0.6).toFixed(2); // sueldo planilla (parte formal) de ejemplo
    S.emp.push({id, nombre:n, documento:'EMP'+String(i+1).padStart(3,'0'), sueldoQuincenal:sueldoQ, sueldoPlanilla:sueldoP, sueldoHora:sueldoH});
    // horario: Lun-Vie 09:00-18:00, fin de semana variable
    for(let d=0; d<7; d++){
      const libre=(d===0); // domingo libre
      const tarde = d===6; // sábado turno tarde
      S.hor.push({empleadoId:id, dia:d, libre, entrada:libre?'':(tarde?'12:00':'09:00'), salida:libre?'':(tarde?'20:00':'18:00')});
    }
  });
  // Marcaciones de ejemplo (quincena actual): un par de días con tardanza y una falta
  const e0=S.emp[0].id, e1=S.emp[1].id, e2=S.emp[2].id;
  const y=_now.getFullYear(), m=String(_now.getMonth()+1).padStart(2,'0');
  S.mar.push({id:uid(),empleadoId:e0,fecha:`${y}-${m}-02`,entradaReal:'09:05',salidaReal:'18:00'});
  S.mar.push({id:uid(),empleadoId:e0,fecha:`${y}-${m}-03`,entradaReal:'09:50',salidaReal:'18:00'}); // tardanza
  S.mar.push({id:uid(),empleadoId:e1,fecha:`${y}-${m}-02`,entradaReal:'09:00',salidaReal:'20:30'}); // horas extra
  S.mar.push({id:uid(),empleadoId:e2,fecha:`${y}-${m}-02`,entradaReal:'09:00',salidaReal:null});      // falta marcación
  // descuentos / pagos / vacaciones de ejemplo
  S.desc.push({id:uid(),empleadoId:e0,fecha:`${y}-${m}-04`,tipo:'Adelanto',monto:50,detalle:'Adelanto solicitado'});
  S.pago.push({id:uid(),empleadoId:e1,fecha:`${y}-${m}-05`,tipo:'Bono',monto:40,detalle:'Bono de productividad'});
  S.libre.push({id:uid(),empleadoId:e2,fecha:`${y}-${m}-06`,tipo:'Vacaciones',comentario:'Vacaciones programadas'});

  save(K.emp,S.emp);save(K.hor,S.hor);save(K.mar,S.mar);save(K.desc,S.desc);save(K.pago,S.pago);save(K.libre,S.libre);
  CONSIDERAR_HE={}; calcPendingHE={}; saveConsiderarHE(CONSIDERAR_HE);
  localStorage.setItem(K.seed,'1');
}

/* ---------- Botones globales de datos ---------- */
document.getElementById('btnSeed').onclick=()=>{
  if(confirm('Esto reemplazará TODOS los datos actuales por los datos de ejemplo. ¿Continuar?')){
    seedData(); reloadState(); toast('Datos de ejemplo cargados','success'); goto(currentPage);
  }
};
document.getElementById('btnWipe').onclick=()=>{
  if(confirm('Esto borrará TODOS los datos. ¿Continuar?')){
    Object.values(K).forEach(k=>localStorage.removeItem(k));
    CONSIDERAR_HE={};
    calcPendingHE={};
    reloadState(); toast('Todos los datos fueron borrados','warn'); goto(currentPage);
  }
};

(function init(){
  if(!localStorage.getItem(K.seed)) seedData(); // carga inicial de ejemplo
  reloadState();
  goto('empleados');
})();
